<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="src/output.css" rel="stylesheet">
  <title>Dal Mechanical Engineering</title>
</head>
<body>
  
  <!-- ================= NAVBAR ================= -->
  <header class="border-b border-white/10 bg-(--dal-charcoal) shadow-sm">
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a href="#home" class="flex items-center gap-3">
        <img
          src="logo.png"
          alt="Dalhousie Mechanical Engineering Society logo"
          class="h-10 w-10 rounded-full object-contain"
        />
        <span class="text-sm font-semibold tracking-[0.12em] text-(--dal-gold) uppercase">
          Dal MES
        </span>
      </a>

      <!-- Primary navigation -->
      <div class="flex items-center gap-8">
        <a
          href="#home"
          class="border-b-2 border-(--dal-red) pb-1 text-[0.75rem] font-semibold uppercase tracking-[0.18em] text-(--dal-gold)"
        >
          Home
        </a>
        <a
          href="#about"
          class="border-b-2 border-transparent pb-1 text-[0.75rem] font-semibold uppercase tracking-[0.18em] text-(--dal-gold) hover:border-(--dal-red)"
        >
          About
        </a>
        <a
          href="#events"
          class="border-b-2 border-transparent pb-1 text-[0.75rem] font-semibold uppercase tracking-[0.18em] text-(--dal-gold) hover:border-(--dal-red)"
        >
          Events
        </a>
        <a
          href="#contact"
          class="border-b-2 border-transparent pb-1 text-[0.75rem] font-semibold uppercase tracking-[0.18em] text-(--dal-gold) hover:border-(--dal-red)"
        >
          Contact
        </a>
      </div>
    </nav>
  </header>

  <main id="home" class="bg-(--dal-charcoal) text-white">
    <!-- Hero / welcome section -->
    <section class="mx-auto max-w-6xl px-4 py-16 sm:px-6 lg:px-8">
      <div class="text-center">
        <h1 class="text-5xl font-bold text-(--dal-gold) sm:text-6xl">
          Welcome
        </h1>
        <div class="mx-auto mt-4 h-0.5 w-16 bg-(--dal-red)"></div>
        <p class="mt-6 text-lg text-gray-100">
          Dalhousie Mechanical Engineering Society
        </p>
      </div>
    </section>
  </main>
</body>
</html>
